name: Generate Repo Root Structure

on:
  workflow_dispatch:

jobs:
  build-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Enterprise Root Directories
        run: |
          mkdir -p .devcontainer
          mkdir -p .vscode
          mkdir -p .config
          mkdir -p .githooks
          mkdir -p .github/workflows
          mkdir -p .github/ISSUE_TEMPLATE
          mkdir -p .github/LINTERS
          mkdir -p .docs
          mkdir -p cmd/fetcher
          mkdir -p pkg/github
          mkdir -p ui
          mkdir -p assets

      - name: Seed Directories with Tracking Files
        run: |
          touch .devcontainer/.gitkeep
          touch .vscode/.gitkeep
          touch .config/.gitkeep
          touch .githooks/.gitkeep
          touch .github/ISSUE_TEMPLATE/.gitkeep
          touch .github/LINTERS/.gitkeep
          touch .docs/.gitkeep
          touch cmd/fetcher/.gitkeep
          touch pkg/github/.gitkeep
          touch ui/.gitkeep
          touch assets/.gitkeep

      - name: Commit and Push Structural Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: initialize professional root folder structure"
            # Explicitly state refs/heads/ to prevent "dst refspec matches more than one"
            git push origin HEAD:refs/heads/${{ github.ref_name }}
          else
            echo "All folders already exist. No updates needed."
          fi
