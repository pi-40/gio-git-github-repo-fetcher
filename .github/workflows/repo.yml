name: Generate Repo Root Structure

on:
  workflow_dispatch: # This allows you to trigger it manually from the Actions tab

jobs:
  build-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the action permission to commit new folders to your repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Enterprise Root Directories
        run: |
          # 1. Dev environments & configuration templates
          mkdir -p .devcontainer
          mkdir -p .vscode
          mkdir -p .config
          mkdir -p .githooks

          # 2. GitHub Platform automation & template folders
          mkdir -p .github/workflows
          mkdir -p .github/ISSUE_TEMPLATE
          mkdir -p .github/LINTERS

          # 3. Documentation assets
          mkdir -p .docs

          # 4. Standard application codebase folders
          mkdir -p cmd/fetcher
          mkdir -p pkg/github
          mkdir -p ui
          mkdir -p assets

      - name: Seed Directories with Tracking Files
        run: |
          # Git requires a file inside a folder to track and display it on GitHub
          touch .devcontainer/.gitkeep
          touch .vscode/.gitkeep
          touch .config/.gitkeep
          touch .githooks/.gitkeep
          touch .github/ISSUE_TEMPLATE/.gitkeep
          touch .github/LINTERS/.gitkeep
          touch .docs/.gitkeep
          touch cmd/fetcher/.gitkeep
          touch pkg/github/.gitkeep
          touch ui/.gitkeep
          touch assets/.gitkeep

      - name: Commit and Push Structural Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          git add -A
          
          # Only commit if changes are detected to prevent workflow execution errors
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: initialize professional root folder structure"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "All folders already exist. No updates needed."
          fi
