name: Push NuGet Package to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Branch or Tag to build (Leave blank for default)'
        required: false
        default: 'main'
        type: string

jobs:
  deploy-nuget:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write  # Crucial permission so the bot can upload to GitHub Packages

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Updates to your target .NET version if needed

      # Finds your .csproj file anywhere in the repo, builds it, and creates the .nupkg file
      - name: Build and Pack NuGet
        run: |
          dotnet build --configuration Release
          dotnet pack --configuration Release --output ./nupkgs

      # Pushes the generated .nupkg file straight to your personal/repo GitHub Package Registry
      - name: Push to GitHub Packages Registry
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
