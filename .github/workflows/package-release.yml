name: Push NuGet Package to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Branch or Tag to build (Leave blank for default)'
        required: false
        default: 'main'
        type: string

jobs:
  deploy-nuget:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Uses PowerShell to locate the actual file path dynamically
      - name: Build and Pack NuGet Project Directly
        shell: powershell
        run: |
          $csproj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1 -ExpandProperty FullName
          if (-not $csproj) {
              Write-Error "Could not find any .csproj file in the repository!"
              exit 1
          }
          Write-Host "Found project file: $csproj"
          dotnet build "$csproj" --configuration Release
          dotnet pack "$csproj" --configuration Release --output ./nupkgs

      - name: Push to GitHub Packages Registry
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
