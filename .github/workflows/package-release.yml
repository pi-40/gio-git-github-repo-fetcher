name: Package Release (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag or branch to package (Leave blank for default branch)'
        required: false
        default: 'main'
        type: string

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Inspect Workspace Files
        run: |
          echo "=== Here are the files the bot sees inside your repository ==="
          ls -R
          echo "=========================================================="

      - name: Smart Build and Package
        run: |
          # 1. Look for Go files somewhere in the project
          if find . -name "*.go" | grep -q "."; then
            echo "Found Go source files! Initializing and compiling..."
            if [ ! -f go.mod ]; then
              go mod init gio-git-github-repo-fetcher || true
            fi
            go mod tidy || true
            go build -v -o repo-fetcher ./... || go build -v -o repo-fetcher main.go || true
            tar -czvf repo-package.tar.gz repo-fetcher
          
          # 2. If it's a web tool or script repository (HTML, JS, Python, AutoIt, etc.)
          else
            echo "No compiler language found. Packaging repository files into a universal zip asset..."
            zip -r repo-package.zip . -x "*.git*" -x ".github*"
          fi

      - name: Upload Package Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || 'latest' }}
          files: |
            repo-package.tar.gz
            repo-package.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
