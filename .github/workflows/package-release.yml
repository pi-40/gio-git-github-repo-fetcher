name: Package Release (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag or branch to package (Leave blank for default branch)'
        required: false
        default: 'main'
        type: string

jobs:
  build-and-package:
    runs-on: ubuntu-latest # Go builds faster and easier on Linux
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Change this to your Go version if needed

      - name: Build Application
        run: |
          go build -v -o repo-fetcher

      # Packages the binary into a universal tarball/zip archive asset attached to your release
      - name: Package Archive
        run: |
          tar -czvf repo-fetcher-package.tar.gz repo-fetcher

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || 'latest' }}
          files: repo-fetcher-package.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
