name: Package Release (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'The tag name of the release to package (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-and-package:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag }}

      # Setup .NET environment for C# builds
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build --configuration Release

      # Publishes the NuGet package directly to your GitHub repository registry
      - name: Publish Package
        run: dotnet nuget push **/*.nupkg --source "https://nuget.pkg.github.com/pi-40/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
