name: Package Release (Manual Trigger)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag or branch to package (Leave blank for default branch)'
        required: false
        default: 'main'
        type: string

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false # Disables the automatic check for go.sum so it won't crash

      # Runs module initialization if go.mod doesn't exist yet, then builds
      - name: Initialize and Build Application
        run: |
          if [ ! -f go.mod ]; then
            go mod init gio-git-github-repo-fetcher
          fi
          go mod tidy
          go build -v -o repo-fetcher

      - name: Package Archive
        run: |
          tar -czvf repo-fetcher-package.tar.gz repo-fetcher

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || 'latest' }}
          files: repo-fetcher-package.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
