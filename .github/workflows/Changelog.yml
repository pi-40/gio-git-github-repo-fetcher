name: Auto Log Changelog

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-changelog:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update CHANGELOG.md
        run: |
          touch CHANGELOG.md
          echo "## Updates on $(date +'%Y-%m-%d %H:%M:%S')" > new_changes.txt
          echo "" >> new_changes.txt
          
          # This formats commits as: * Commit Message (By: Author Name) [hash]
          git log -n 5 --pretty=format:"* %s (By: %an) [%h]" >> new_changes.txt
          
          echo "" >> new_changes.txt
          echo "" >> new_changes.txt
          echo "---" >> new_changes.txt
          echo "" >> new_changes.txt
          
          cat CHANGELOG.md >> new_changes.txt
          mv new_changes.txt CHANGELOG.md

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md [skip ci]" || echo "No changes to commit"
          git push
